<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e90ff, #00bfff);
    }
    .card-login {
      border: none;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .mensaje-error {
      color: #dc3545;
      font-size: 14px;
      text-align: center;
      display: none;
      margin-top: 8px;
    }
    .mensaje-exito {
      color: #198754;
      font-size: 14px;
      text-align: center;
      display: none;
      margin-top: 8px;
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="card card-login p-4" style="width: 340px;">
    <h3 class="text-center mb-1">Iniciar sesión</h3>
    <p class="text-center text-muted" style="font-size: 13px;">Portafolio de Javier Cuba</p>

    <input type="text" id="input-usuario" class="form-control my-2" placeholder="Usuario">
    <input type="password" id="input-password" class="form-control my-2" placeholder="Contraseña">

    <div class="mensaje-error" id="msg-error"></div>
    <div class="mensaje-exito" id="msg-exito">¡Bienvenido! Redirigiendo...</div>

    <button class="btn btn-primary w-100 mt-3" onclick="iniciarSesion()">Entrar</button>

    <hr>

    <p class="text-center text-muted mb-1" style="font-size: 12px;">¿No tienes cuenta?</p>
    <button class="btn btn-outline-secondary w-100" onclick="mostrarRegistro()">Registrarse</button>

    <div id="panel-registro" style="display:none; margin-top: 16px;">
      <hr>
      <p class="text-center" style="font-size: 13px; font-weight: 500;">Crear cuenta nueva</p>
      <input type="text" id="reg-usuario" class="form-control my-2" placeholder="Nuevo usuario">
      <input type="password" id="reg-password" class="form-control my-2" placeholder="Nueva contraseña">
      <div class="mensaje-error" id="msg-reg-error"></div>
      <div class="mensaje-exito" id="msg-reg-exito"></div>
      <button class="btn btn-success w-100 mt-2" onclick="registrarUsuario()">Crear cuenta</button>
    </div>
  </div>

  <script src="js/login.js"></script>

</body>
</html>
