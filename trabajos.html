  <link rel="stylesheet" href="css/styles.css">
</head>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container">

    <a class="navbar-brand" href="index.html" id="navbar-nombre">Bienvenido</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      ☰
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link nav-link-white" href="index.html">Inicio</a>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-link-white" href="index.html#sobre-mi">Sobre mí</a>

        <li class="nav-item">

        </li>

      </ul>
    </div>
  </div>
</nav>
<body>

<<div class="container my-5">

  <div class="container my-5">
    <section id="trabajos" class="container my-5">
    <div class="header-trabajos text-center text-white">
        <h1>Mis Trabajos</h1>
    </div>
  <div class="unidad">
  <h3>Unidad 1</h3>

  <div class="row" id="unidad-1">

    <!-- SEMANA 1 (manual) -->
    <div class="col-md-4">
  <div class="card p-3 semana-card">

    <!-- BOTÓN ELIMINAR (arriba derecha) -->
    <span class="btn-eliminar" onclick="eliminarSemana(this)">🗑</span>

    <h5>Semana 1</h5>
    <p>Informe técnico comparativo sobre arquitecturas</p>

    <a href="archivos/ResumenDeArchivo.pdf" target="_blank" class="btn btn-primary mb-2">
      Ver resumen
    </a>

    <!-- BOTÓN VER MÁS -->
    <button class="btn btn-outline-primary btn-sm" onclick="verMas(this)">
      Ver más trabajos
    </button>

    <!-- CONTENEDOR OCULTO -->
    <div class="extra-trabajos mt-2" style="display:none;">
      <a href="archivos/repositorios.pdf" target="_blank" class="btn btn-secondary btn-sm mb-1">
        Ver repositorios
      </a>

      <a href="archivos/BasedeDatosTarea1.pdf" target="_blank" class="btn btn-secondary btn-sm">
        Ver Informe
      </a>
    </div>

  </div>
</div>

  </div>
</div>
  <!-- UNIDAD 2 -->
  <div class="unidad">
    <h3>Unidad 2</h3>
    <div class="row" id="unidad-2"></div>
  </div>

  <!-- UNIDAD 3 -->
  <div class="unidad">
    <h3>Unidad 3</h3>
    <div class="row" id="unidad-3"></div>
  </div>

  <!-- UNIDAD 4 -->
  <div class="unidad">
    <h3>Unidad 4</h3>
    <div class="row" id="unidad-4"></div>
  </div>

</div>
  <!-- BOTON ADMIN -->
  <input type="text" id="titulo-semana" class="form-control my-2" placeholder="Semana (ej: Semana 2)">

<input type="text" id="descripcion-semana" class="form-control my-2" placeholder="Descripción breve">

<input type="file" id="archivo-semana" class="form-control my-2">

<select id="unidad-semana" class="form-control my-2">
  <option value="1">Unidad 1</option>
  <option value="2">Unidad 2</option>
  <option value="3">Unidad 3</option>
  <option value="4">Unidad 4</option>
</select>

<button class="btn btn-success" onclick="agregarSemana()">Agregar Semana</button>

<script src="js/scripts.js"></script>
</body>
<div id="modal" class="modal-custom">
  <div class="modal-content">
    <span onclick="cerrarModal()" class="cerrar">&times;</span>
    <iframe id="visor" width="100%" height="400px"></iframe>
  </div>
</div>
</html>
